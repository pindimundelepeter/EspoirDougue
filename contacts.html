<section style="flex:1;">
  <h2>Contactez-nous</h2>

  <form id="mon-formulaire">

    <input type="text" id="nom" placeholder="Votre nom">
    <br>
    <input type="email" id="email" placeholder="Votre email">
    <br>
    <select id="sujet" name="Sujet" required style="width:325px; padding:12px; border:1px solid #ccc; border-radius:5px;">
  <option value="" disabled selected>   Choisir un sujet </option>
  <option value="Bénévolat">Bénévolat</option>
  <option value="Partenariat">Partenariat</option>
  <option value="Information">Demande d'information</option>
  <option value="Autre">Autre</option>
</select>
<br>
    <textarea id="message" rows="5" placeholder="Votre message"></textarea>
    <br>
    <button type="submit">Envoyer</button>

  </form>

  <p id="confirmation" style="display:none; color: green; font-weight: 500;">
    ✓ Message envoyé avec succès !
  </p>

</section>

<script>
  document.getElementById('mon-formulaire').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch('https://formspree.io/f/mvzyvywe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nom: document.getElementById('nom').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
        sujet: document.getElementById('sujet').value
      })
    }).then(function() {
      document.getElementById('mon-formulaire').style.display = 'none';
      document.getElementById('confirmation').style.display = 'block';
    });
  });
</script>
